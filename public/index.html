<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Reminder App</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f4; }
    form { max-width: 400px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; }
    input { display: block; margin: 10px 0; padding: 8px; width: 100%; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #45a049; }
  </style>
</head>
<body>
  <h2 style="text-align:center;">Register Birthday</h2>
  <form id="birthdayForm">
    <input type="text" id="username" placeholder="Username" required />
    <input type="email" id="email" placeholder="Email" required />
    <input type="date" id="dob" required />
    <button type="submit">Save</button>
  </form>

  <script>
    document.getElementById("birthdayForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = {
        username: document.getElementById("username").value,
        email: document.getElementById("email").value,
        dob: document.getElementById("dob").value
      };

      const res = await fetch("/api/users", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      if (res.ok) alert("Birthday saved!");
      else alert("Error saving birthday.");
    });
  </script>
</body>
</html>
